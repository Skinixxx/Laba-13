apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-checker
  labels:
    app: assignment-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assignment-checker
  template:
    metadata:
      labels:
        app: assignment-checker
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: agent
        image: assignment-check:scalable
        imagePullPolicy: IfNotPresent
        env:
        - name: NATS_HOST
          value: "__KIND_GATEWAY__"
        - name: NATS_URL
          value: "nats://__KIND_GATEWAY__:4222"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://__KIND_GATEWAY__:4318"
        resources:
          requests:
            cpu: 100m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 64Mi
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "ps aux | grep -q '[a]gent'"
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "ps aux | grep -q '[a]gent'"
          initialDelaySeconds: 3
          periodSeconds: 10
