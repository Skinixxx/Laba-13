{% extends "base.html" %}
{% block title %} — Run Task{% endblock %}
{% block content %}
<h1>Run Task</h1>

{% if success %}<div class="alert-success">{{ success }}</div>{% endif %}
{% if error %}<div class="alert-error">{{ error }}</div>{% endif %}

<form method="post" action="/run">
    <div class="form-group">
        <label for="task_type">Task Type</label>
        <select name="task_type">
            <option value="feedback">LLM Feedback</option>
            <option value="recommend">Course Recommendation</option>
            <option value="certificate">Certificate Generation</option>
        </select>
    </div>

    <h2 style="margin-top: 0;">Task Parameters</h2>
    <div class="grid-2">
        <div class="form-group">
            <label for="user_id">User ID</label>
            <input type="text" name="user_id" value="u-001">
        </div>
        <div class="form-group">
            <label for="user_name">User Name</label>
            <input type="text" name="user_name" value="Тестовый студент">
        </div>
        <div class="form-group">
            <label for="course_name">Course Name</label>
            <input type="text" name="course_name" value="ML with Python">
        </div>
        <div class="form-group">
            <label for="assignment_type">Assignment Type</label>
            <select name="assignment_type">
                <option value="test">Test</option>
                <option value="essay" selected>Essay</option>
                <option value="code">Code</option>
            </select>
        </div>
        <div class="form-group">
            <label for="score">Score</label>
            <input type="number" name="score" value="85" min="0" max="100">
        </div>
        <div class="form-group">
            <label for="passed">Passed</label>
            <select name="passed">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>
        <div class="form-group">
            <label for="trend">Trend</label>
            <select name="trend">
                <option value="improving">Improving</option>
                <option value="stable" selected>Stable</option>
                <option value="declining">Declining</option>
            </select>
        </div>
        <div class="form-group">
            <label for="avg_score">Avg Score</label>
            <input type="number" name="avg_score" value="80.0" step="0.1">
        </div>
    </div>
    <button type="submit">🚀 Send Task</button>
</form>
{% endblock %}
